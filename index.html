<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="ROBOTS" content="INDEX, FOLLOW" />
    <meta name="VIEWPORT" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="https://telraam.net/favicon.ico">
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="script.js" defer></script>
    <title>Export Telraam data</title>
</head>

<body>
    <h1>Export Telraam traffic stats</h1>
    <label>Location ID (last part of URL, for example <a href="https://telraam.net/en/location/9000007951" target="_blank">https://telraam.net/en/location/<b>9000007951</b></a>): <input type="text" id="idLocationId" list="isIds" class="input" placeholder="Enter location id" value="9000007951" /></label>
    <datalist id="isIds">
        <option value="9000007951"></option>
        <option value="9000007626"></option>
        <option value="9000007629"></option>
        <option value="9000004815"></option>
    </datalist>
    <br>
    <label>From <input type="date" id="idDateStart"></label><label> to <input type="date" id="idDateEnd"></label> (<label>decimal locale <input type="text" id="idDecimalLocale" class="small" value="nl-NL" /></label>)
    <br>
    <button id="idSubmit">Export</button>
    <br>
    <textarea id="idExport" rows="95"></textarea>
    <br>
</body>

</html>
